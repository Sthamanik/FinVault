services:
  app:
    build: .
    container_name: finvault_api
    ports:
      - '5001:5001'
    env_file:
      - .env
    volumes:
      - ./tmp:/app/tmp
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - genesis_network

  mongo: 
    image: mongo:8
    container_name: finvault_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - genesis_network

  redis:
    image: redis:8
    container_name: finvault_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - finvault_network

volumes:
  mongo_data:
  redis_data:

networks:
  finvault_network: 
    driver: bridge